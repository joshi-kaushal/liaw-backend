services:
  db:
    image: postgres:16-alpine
    container_name: liaw-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-liaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-liaw_dev_pass}
      POSTGRES_DB: ${POSTGRES_DB:-liaw}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-liaw}"]
      interval: 5s
      timeout: 3s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: liaw-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@liaw.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liaw-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-liaw}:${POSTGRES_PASSWORD:-liaw_dev_pass}@db:5432/${POSTGRES_DB:-liaw}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    volumes:
      - ./app:/code/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
